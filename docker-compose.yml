services:
  # 1. Neo4j: 图数据库
  neo4j:
    image: neo4j:latest
    container_name: edu_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"] # 开启APOC插件
    volumes:
      - ./dbs/neo4j:/data

  # 2. Qdrant: 向量数据库
  qdrant:
    image: qdrant/qdrant:latest  
    container_name: edu_qdrant
    ports:
      - "6333:6333" # 向量检索接口：浏览器输入localhost:6333/dashboard
    volumes:
      - ./dbs/qdrant:/qdrant/storage
  
  # 3. Redis: 缓存
  redis:
    image: redis/redis-stack:latest
    container_name: edu_redis
    ports:
      - "6379:6379" # 终端输入：docker exec -it edu_redis redis-cli ping 
      - "8001:8001" 
  
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: edu_litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/1
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}

